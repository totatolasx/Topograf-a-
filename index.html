<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TopoPro PRO Colombia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        #map { height: 48vh; width: 100%; border-radius: 2.5rem; border: 4px solid white; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); z-index: 1; }
        .panel { background: white; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .btn-sys { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 900; transition: all 0.2s; }
        .btn-active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        .compass-ui { 
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; width: 50px; height: 50px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 3px solid #2563eb; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .compass-needle { width: 4px; height: 25px; background: linear-gradient(to bottom, #ef4444 50%, #1e293b 50%); border-radius: 2px; }
        .leaflet-control-layers { border-radius: 15px !important; border: none !important; padding: 8px !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-lg mx-auto space-y-4">
        <div class="panel p-5 flex justify-between items-center">
            <div>
                <h1 class="font-900 text-xl tracking-tighter text-slate-800 italic">TopoPro <span class="text-blue-600">PRO</span></h1>
                <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">Colombia Precision</p>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="setSystem('CTM12')" id="b-ctm" class="btn-sys btn-active">CTM12</button>
                <button onclick="setSystem('BOGOTA')" id="b-bog" class="btn-sys text-slate-400">BOGOTÁ</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="panel p-5 border-l-4 border-blue-600">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Norte (N)</p>
                <p id="t-n" class="text-2xl font-mono text-slate-800">0.000</p>
            </div>
            <div class="panel p-5 border-l-4 border-blue-600">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Este (E)</p>
                <p id="t-e" class="text-2xl font-mono text-slate-800">0.000</p>
            </div>
            <div class="panel p-5 col-span-2 border-l-4 border-emerald-500 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-emerald-600 uppercase mb-1 text-xs">Elevación Geoidal</p>
                    <p id="t-h" class="text-3xl font-mono text-slate-800">--- <span class="text-sm">m</span></p>
                </div>
                <button onclick="copyData()" class="bg-slate-900 text-white p-4 rounded-2xl font-black text-xs active:scale-90 transition-transform">COPIAR</button>
            </div>
        </div>

        <div class="relative">
            <div id="map"></div>
            <div class="compass-ui">
                <div class="compass-needle"></div>
                <span class="text-[10px] font-black text-red-500 mt-0.5">N</span>
            </div>
            <button id="gps" class="absolute bottom-6 right-6 z-[1000] bg-blue-600 text-white p-5 rounded-3xl shadow-2xl active:scale-95 transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </button>
        </div>
    </div>

    <script>
        const S = {
            CTM12: { a: 6378137.0, f: 1/298.257222101, lat0: 4.0, lon0: -73.0, N0: 2000000, E0: 5000000, k0: 0.9992 },
            BOGOTA: { a: 6378137.0, f: 1/298.257222101, lat0: 4.596200417, lon0: -74.077507917, N0: 1000000, E0: 1000000, k0: 1.0 }
        };
        let sys = 'CTM12'; let wId = null; let lt = 4.57, ln = -74.3;
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const lbl = L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-labels/{z}/{x}/{y}{r}.png', {opacity:0.7});
        const hyb = L.layerGroup([sat, lbl]);
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const map = L.map('map', { zoomControl: false, layers: [hyb] }).setView([lt, ln], 6);
        L.control.layers({ "Híbrido": hyb, "Calles": osm }, null, { position: 'topright' }).addTo(map);
        let mk = null;

        function setSystem(val) {
            sys = val;
            document.getElementById('b-ctm').className = val === 'CTM12' ? 'btn-sys btn-active' : 'btn-sys text-slate-400';
            document.getElementById('b-bog').className = val === 'BOGOTA' ? 'btn-sys btn-active' : 'btn-sys text-slate-400';
            upd(lt, ln, false);
        }

        function proj(la, lo) {
            const d = S[sys]; const r = Math.PI/180;
            const p = la*r; const l = lo*r; const p0 = d.lat0*r; const l0 = d.lon0*r;
            const x = (l - l0) * Math.cos(p); const y = (p - p0);
            return { n: d.N0 + (y*d.a*d.k0), e: d.E0 + (x*d.a*d.k0) };
        }

        async function getH(la, lo) {
            try {
                const r = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${la},${lo}`);
                const j = await r.json();
                if(j.results?.[0]) document.getElementById('t-h').innerHTML = `${j.results[0].elevation.toFixed(1)} <span class="text-sm font-bold">m</span>`;
            } catch(e) {}
        }

        function upd(la, lo, mv = true) {
            lt = la; ln = lo; const c = proj(la, lo);
            document.getElementById('t-n').innerText = c.n.toLocaleString('es-CO', {minimumFractionDigits:3, useGrouping:false});
            document.getElementById('t-e').innerText = c.e.toLocaleString('es-CO', {minimumFractionDigits:3, useGrouping:false});
            getH(la, lo);
            if(mk) map.removeLayer(mk);
            mk = L.circleMarker([la, lo], { radius: 10, color: 'white', weight: 3, fillColor: '#2563eb', fillOpacity: 1 }).addTo(map);
            if(mv) map.setView([la, lo], 18);
        }

        function copyData() {
            const t = `SISTEMA: ${sys}\nN: ${document.getElementById('t-n').innerText}\nE: ${document.getElementById('t-e').innerText}\nH: ${document.getElementById('t-h').innerText}`;
            const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("Copiado al portapapeles");
        }

        document.getElementById('gps').addEventListener('click', () => {
            if(wId) { navigator.geolocation.clearWatch(wId); wId = null; return; }
            wId = navigator.geolocation.watchPosition((p) => upd(p.coords.latitude, p.coords.longitude), null, {enableHighAccuracy:true});
        });

        map.on('click', (e) => upd(e.latlng.lat, e.latlng.lng, false));
    </script>
</body>
</html>
