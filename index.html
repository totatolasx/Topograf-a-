<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TopoPro Elite V5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;600;800&display=swap');
        
        :root { --accent: #3b82f6; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        #map { height: 50vh; width: 100%; background: #0f172a; z-index: 1; }
        
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* Modal pequeño y elegante */
        #msg-box { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 9999; width: 280px; text-align: center; border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--accent);
        }

        /* Notificación Toast */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px);
            z-index: 10000; padding: 12px 24px; border-radius: 12px; font-weight: 700;
            transition: transform 0.3s ease;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .compass-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: white; width: 42px; height: 42px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent);
        }
        .needle { 
            width: 4px; height: 26px; background: linear-gradient(to bottom, #ef4444 50%, #1e293b 50%); 
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); 
        }

        .btn-action { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-action:active { scale: 0.92; background: var(--accent); }
    </style>
</head>
<body>

    <!-- Toast Personalizado (Reemplaza al alert feo) -->
    <div id="toast" class="glass text-emerald-400 text-xs uppercase tracking-widest border-emerald-500/30">
        ✅ Coordenadas Copiadas
    </div>

    <!-- Modal de Carga Mejorado -->
    <div id="msg-box" class="glass p-6">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <h3 class="text-white font-800 text-sm uppercase mb-1">Sincronizando GNSS</h3>
        <p class="text-[10px] text-slate-400 mb-4">Buscando señal de alta precisión (±30m máx)...</p>
        <button onclick="requestGPS()" class="bg-blue-600 text-[10px] font-black w-full py-3 rounded-xl uppercase">Forzar Inicio</button>
    </div>

    <!-- Cabecera -->
    <div class="p-4 flex justify-between items-center bg-slate-950 border-b border-white/5">
        <div>
            <h1 class="text-lg font-800 tracking-tighter italic text-white uppercase">TopoPro <span class="text-blue-500">Elite</span></h1>
            <p class="text-[7px] font-bold text-slate-500 uppercase tracking-[0.2em]">Geodesia Profesional v5.0</p>
        </div>
        <div class="flex bg-slate-900 p-1 rounded-xl">
            <button onclick="setSystem('CTM12')" id="b-ctm" class="px-4 py-2 rounded-lg text-[9px] font-black bg-blue-600 text-white">CTM12</button>
            <button onclick="setSystem('MAGNA')" id="b-bog" class="px-4 py-2 rounded-lg text-[9px] font-black text-slate-500 ml-1 uppercase">Magna</button>
        </div>
    </div>

    <!-- Panel de Coordenadas Puras -->
    <div class="p-4 grid grid-cols-2 gap-3">
        <div class="glass p-4 rounded-2xl border-l-4 border-blue-500">
            <p class="text-[8px] font-black text-blue-400 uppercase mb-1 opacity-70 text-right">Norte</p>
            <p id="t-n" class="text-lg font-mono font-bold text-white tracking-tighter">Buscando...</p>
        </div>
        <div class="glass p-4 rounded-2xl border-l-4 border-blue-500">
            <p class="text-[8px] font-black text-blue-400 uppercase mb-1 opacity-70 text-right">Este</p>
            <p id="t-e" class="text-lg font-mono font-bold text-white tracking-tighter">Buscando...</p>
        </div>
        <div class="glass p-4 rounded-2xl flex justify-between items-center col-span-2 border-l-4 border-emerald-500">
            <div>
                <p class="text-[8px] font-black text-emerald-400 uppercase mb-1 opacity-70">Elevación MSNM</p>
                <p id="t-h" class="text-xl font-mono font-bold text-white">---.--- m</p>
            </div>
            <button onclick="copyData()" class="btn-action bg-slate-800 p-3 rounded-xl">
                <svg width="20" height="20" fill="none" stroke="#3b82f6" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
            </button>
        </div>
    </div>

    <!-- Mapa -->
    <div class="relative flex-grow">
        <div id="map"></div>
        <div class="compass-btn" onclick="resetMap()">
            <div id="needle" class="needle"></div>
        </div>
        <button onclick="requestGPS()" class="absolute bottom-6 right-6 z-[1000] bg-blue-600 text-white p-4 rounded-2xl shadow-2xl border-2 border-white/20 btn-action">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </button>
    </div>

    <!-- Footer de Estado -->
    <div class="glass m-4 p-4 rounded-2xl">
        <div class="flex justify-between items-center mb-1">
            <div class="flex items-center">
                <div id="gps-dot" class="w-2 h-2 rounded-full bg-red-500 mr-2"></div>
                <span id="gps-text" class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">GPS: Iniciando...</span>
            </div>
            <span id="t-prec" class="text-[9px] font-mono font-bold text-red-500 italic">± -- m</span>
        </div>
        <p id="t-sitio" class="text-[10px] text-slate-400 truncate font-medium">Sincronizando con estación base geodésica...</p>
    </div>

    <script>
        const PROJ = {
            CTM12: { a: 6378137.0, f: 1/298.257222101, lat0: 4.0, lon0: -73.0, N0: 2000000.0, E0: 5000000.0, k0: 0.9992 },
            MAGNA: { a: 6378137.0, f: 1/298.257222101, lat0: 4.596200417, lon0: -74.077507917, N0: 1000000.0, E0: 1000000.0, k0: 1.0 }
        };

        let sys = 'CTM12', wId = null, lastLat = null, lastLon = null;
        let isFirstFix = true;

        function forwardGK(lat, lon) {
            const p = PROJ[sys];
            const rad = Math.PI / 180;
            const phi = lat * rad, lambda = lon * rad;
            const phi0 = p.lat0 * rad, lambda0 = p.lon0 * rad;
            const e2 = 2 * p.f - p.f**2, ep2 = e2 / (1 - e2);
            const n = p.a / Math.sqrt(1 - e2 * Math.sin(phi)**2);
            const t = Math.tan(phi)**2, c = ep2 * Math.cos(phi)**2, a = (lambda - lambda0) * Math.cos(phi);
            const M = p.a * ((1 - e2/4 - 3*e2**2/64) * phi - (3*e2/8 + 3*e2**2/32) * Math.sin(2*phi) + (15*e2**2/256) * Math.sin(4*phi));
            const M0 = p.a * ((1 - e2/4 - 3*e2**2/64) * phi0 - (3*e2/8 + 3*e2**2/32) * Math.sin(2*phi0) + (15*e2**2/256) * Math.sin(4*phi0));
            const norte = p.N0 + p.k0 * (M - M0 + n * Math.tan(phi) * (a**2/2 + (5 - t + 9*c + 4*c**2) * a**4/24));
            const este = p.E0 + p.k0 * n * (a + (1 - t + c) * a**3/6 + (5 - 18*t + t**2 + 72*c) * a**5/120);
            return { n: norte.toFixed(3), e: este.toFixed(3) };
        }

        const map = L.map('map', { 
            center: [4.57, -74.29], zoom: 17, zoomControl: false, 
            rotate: true, touchRotate: true,
            layers: [
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png')
            ]
        });

        let marker = null;

        function updateData(la, lo, acc = 0) {
            // Filtro de Calidad: Si la precisión es peor a 40m y no es el primer fix, ignorar.
            if(acc > 40 && !isFirstFix) return;

            lastLat = la; lastLon = lo;
            const c = forwardGK(la, lo);
            document.getElementById('t-n').innerText = c.n;
            document.getElementById('t-e').innerText = c.e;
            
            document.getElementById('t-prec').innerText = `± ${acc.toFixed(1)} m`;
            const dot = document.getElementById('gps-dot');
            const txt = document.getElementById('gps-text');

            if(acc < 15) {
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";
                txt.innerText = "GPS: ALTA PRECISIÓN";
                document.getElementById('t-prec').className = "text-[9px] font-mono font-bold text-emerald-400";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
                txt.innerText = "GPS: OPTIMIZANDO...";
                document.getElementById('t-prec').className = "text-[9px] font-mono font-bold text-amber-400";
            }
            
            if(marker) map.removeLayer(marker);
            marker = L.circleMarker([la, lo], { radius: 8, color: 'white', weight: 3, fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            
            // Auto-vuelo en el primer fix
            if(isFirstFix) {
                map.flyTo([la, lo], 18, { duration: 1.5 });
                isFirstFix = false;
                document.getElementById('msg-box').style.display = "none";
            }

            fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${la},${lo}`)
                .then(r => r.json()).then(d => { if(d.results[0]) document.getElementById('t-h').innerText = d.results[0].elevation.toFixed(3) + " m"; });
        }

        function requestGPS() {
            if(wId) navigator.geolocation.clearWatch(wId);
            document.getElementById('msg-box').style.display = "block";
            isFirstFix = true; // Reiniciar para que vuelva a volar al punto

            wId = navigator.geolocation.watchPosition(
                (p) => updateData(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
                (err) => { document.getElementById('gps-text').innerText = "ERROR GPS"; },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function setSystem(val) {
            sys = val;
            document.getElementById('b-ctm').className = val === 'CTM12' ? 'px-4 py-2 rounded-lg text-[9px] font-black bg-blue-600 text-white' : 'px-4 py-2 rounded-lg text-[9px] font-black text-slate-500 ml-1';
            document.getElementById('b-bog').className = val === 'MAGNA' ? 'px-4 py-2 rounded-lg text-[9px] font-black bg-blue-600 text-white' : 'px-4 py-2 rounded-lg text-[9px] font-black text-slate-500 ml-1';
            if(lastLat) updateData(lastLat, lastLon);
        }

        function copyData() {
            const text = `N: ${document.getElementById('t-n').innerText}\nE: ${document.getElementById('t-e').innerText}\nH: ${document.getElementById('t-h').innerText}`;
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function resetMap() {
            map.setBearing(0);
            if(lastLat) map.panTo([lastLat, lastLon]);
        }

        map.on('rotate', () => {
            document.getElementById('needle').style.transform = `rotate(${-map.getBearing()}deg)`;
        });

        window.onload = () => setTimeout(requestGPS, 800);
    </script>
</body>
</html>

```
