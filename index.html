<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopoPro Colombia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        #map { height: 40vh; width: 100%; border-radius: 2rem; border: 6px solid white; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); z-index: 1; }
        .panel-topo { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,1); }
        .active-system { border-color: #2563eb !important; background-color: #eff6ff !important; color: #2563eb !important; }
        #copy-toast { visibility: hidden; min-width: 200px; margin-left: -100px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; font-size: 14px; }
        #copy-toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-3 md:p-6 text-slate-800">
    <div id="copy-toast">Copiado al portapapeles</div>
    <div class="max-w-6xl mx-auto space-y-4">
        <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tight">TopoPro <span class="text-blue-600 uppercase">Colombia</span></h1>
                    <p id="display-system-name" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Sistema: CTM12 Origen Nacional</p>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200 w-full md:w-auto shadow-inner">
                <button onclick="setSystem('CTM12')" id="btn-ctm12" class="flex-1 md:flex-none px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all active-system">CTM12 (Nacional)</button>
                <button onclick="setSystem('BOGOTA')" id="btn-bogota" class="flex-1 md:flex-none px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:bg-white/50">Magna Bogotá</button>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="panel-topo p-6 rounded-[2.5rem] shadow-lg border-b-4 border-blue-600">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2 flex items-center gap-2"><span class="w-2 h-2 bg-blue-600 rounded-full"></span> Norte (N)</p>
                <p id="txt-norte" class="text-3xl font-mono-custom font-bold text-slate-800 tracking-tighter">0.000</p>
            </div>
            <div class="panel-topo p-6 rounded-[2.5rem] shadow-lg border-b-4 border-blue-600">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2 flex items-center gap-2"><span class="w-2 h-2 bg-blue-600 rounded-full"></span> Este (E)</p>
                <p id="txt-este" class="text-3xl font-mono-custom font-bold text-slate-800 tracking-tighter">0.000</p>
            </div>
            <div id="panel-altura" class="panel-topo p-6 rounded-[2.5rem] shadow-lg border-b-4 border-emerald-500 bg-emerald-50/20">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[10px] font-black text-emerald-600 uppercase flex items-center gap-2"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Altura (DEM)</p>
                    <button onclick="copyToClipboard()" class="bg-slate-800 text-white text-[9px] px-3 py-1 rounded-full font-bold hover:bg-black transition-colors">COPIAR TODO</button>
                </div>
                <p id="txt-altura" class="text-3xl font-mono-custom font-bold text-slate-800 tracking-tighter italic">---</p>
            </div>
        </div>
        <div class="relative">
            <div id="map"></div>
            <div class="absolute top-6 left-6 z-[1000] bg-white/95 backdrop-blur-md px-4 py-3 rounded-2xl shadow-xl border border-slate-200">
                <div class="flex items-center gap-3">
                    <div id="precision-light" class="w-3 h-3 rounded-full bg-slate-400"></div>
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Precisión GNSS</p>
                        <p id="txt-precision" class="text-sm font-mono-custom font-bold text-slate-700">± 0.0 m</p>
                    </div>
                </div>
            </div>
            <button id="btn-gps" class="absolute bottom-6 right-6 z-[1000] bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 active:scale-95 transition-all group">
                <div id="gps-icon-container"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg></div>
                <span id="btn-gps-text" class="text-xs font-black uppercase tracking-widest">Rastrear en Campo</span>
            </button>
        </div>
    </div>
    <script>
        const SYSTEMS = {
            CTM12: { a: 6378137.0, f: 1/298.257222101, lat0: 4.0, lon0: -73.0, N0: 2000000, E0: 5000000, k0: 0.9992, name: "CTM12 Origen Nacional", epsg: "9377" },
            BOGOTA: { a: 6378137.0, f: 1/298.257222101, lat0: 4.596200417, lon0: -74.077507917, N0: 1000000, E0: 1000000, k0: 1.0, name: "Magna-Sirgas Origen Bogotá", epsg: "3116" }
        };
        let currentSystem = 'CTM12'; let watchId = null; let lastLat = 4.57, lastLon = -74.3;
        const hybridMap = L.layerGroup([L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'), L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-labels/{z}/{x}/{y}{r}.png')]);
        const map = L.map('map', { zoomControl: false, layers: [hybridMap] }).setView([lastLat, lastLon], 6);
        let marker = null;
        function setSystem(sys) { currentSystem = sys; updateDisplay(lastLat, lastLon, 0, false); }
        function project(lat, lon) {
            const S = SYSTEMS[currentSystem]; const rad = Math.PI/180; const phi = lat*rad; const lambda = lon*rad;
            const phi0 = S.lat0*rad; const lambda0 = S.lon0*rad;
            const x = (lambda - lambda0) * Math.cos(phi); const y = (phi - phi0);
            return { n: S.N0 + (y*S.a*S.k0), e: S.E0 + (x*S.a*S.k0) };
        }
        async function fetchElevation(lat, lon) {
            try {
                const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lon}`);
                const data = await res.json();
                if(data.results?.[0]) document.getElementById('txt-altura').innerText = `${data.results[0].elevation.toFixed(1)} m`;
            } catch (e) {}
        }
        function updateDisplay(lat, lon, acc, moveMap = true) {
            lastLat = lat; lastLon = lon; const coords = project(lat, lon);
            document.getElementById('txt-norte').innerText = coords.n.toLocaleString('es-CO', {minimumFractionDigits: 3, useGrouping: false});
            document.getElementById('txt-este').innerText = coords.e.toLocaleString('es-CO', {minimumFractionDigits: 3, useGrouping: false});
            if(acc > 0) document.getElementById('txt-precision').innerText = `± ${acc.toFixed(1)} m`;
            fetchElevation(lat, lon);
            if(marker) map.removeLayer(marker);
            marker = L.circleMarker([lat, lon], { radius: 10, color: 'white', weight: 3, fillColor: '#2563eb', fillOpacity: 1 }).addTo(map);
            if(moveMap) map.flyTo([lat, lon], 18);
        }
        function copyToClipboard() {
            const text = `N: ${document.getElementById('txt-norte').innerText}\nE: ${document.getElementById('txt-este').innerText}\nH: ${document.getElementById('txt-altura').innerText}`;
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            document.getElementById("copy-toast").className = "show";
            setTimeout(() => { document.getElementById("copy-toast").className = ""; }, 3000);
        }
        document.getElementById('btn-gps').addEventListener('click', () => {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; return; }
            watchId = navigator.geolocation.watchPosition((p) => updateDisplay(p.coords.latitude, p.coords.longitude, p.coords.accuracy), null, {enableHighAccuracy:true});
        });
        map.on('click', (e) => updateDisplay(e.latlng.lat, e.latlng.lng, 0, false));
    </script>
</body>
</html>
